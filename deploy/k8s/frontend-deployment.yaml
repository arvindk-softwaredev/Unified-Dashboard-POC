apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-dashboard-frontend
  labels:
    app.kubernetes.io/name: unified-dashboard-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unified-dashboard-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unified-dashboard-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: unified-dashboard-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_UPSTREAM
              value: unified-dashboard-backend:8081
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
