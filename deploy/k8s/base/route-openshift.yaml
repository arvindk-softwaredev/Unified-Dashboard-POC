# OpenShift Route (expose the nginx frontend)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: unified-dashboard
  labels:
    app.kubernetes.io/name: unified-dashboard
spec:
  to:
    kind: Service
    name: unified-dashboard-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
