apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: unified-dashboard
  labels:
    app.kubernetes.io/part-of: unified-dashboard
spec:
  description: Build and deploy Unified Dashboard (Go API + nginx frontend)
  params:
    - name: git-url
      type: string
      description: Git repository URL
    - name: git-revision
      type: string
      default: main
    - name: image-registry
      type: string
      description: >
        Registry host/path prefix, e.g.
        image-registry.openshift-image-registry.svc:5000/unified-dashboard
    - name: image-tag
      type: string
      default: latest
    - name: deploy-namespace
      type: string
      default: unified-dashboard
    - name: run-deploy
      type: string
      default: "true"
      description: Set to "false" to only build and push images
  workspaces:
    - name: source
    - name: dockerconfig
      optional: true
  tasks:
    - name: clone
      taskRef:
        name: git-clone-simple
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    - name: build-backend
      runAfter: [clone]
      taskRef:
        name: build-image-kaniko
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: IMAGE
          value: $(params.image-registry)/unified-dashboard-backend:$(params.image-tag)
        - name: DOCKERFILE
          value: deploy/docker/Dockerfile.backend
        - name: CONTEXT
          value: .

    - name: build-frontend
      runAfter: [clone]
      taskRef:
        name: build-image-kaniko
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: IMAGE
          value: $(params.image-registry)/unified-dashboard-frontend:$(params.image-tag)
        - name: DOCKERFILE
          value: deploy/docker/Dockerfile.frontend
        - name: CONTEXT
          value: .

    - name: deploy
      runAfter: [build-backend, build-frontend]
      when:
        - input: "$(params.run-deploy)"
          operator: in
          values: ["true", "True", "TRUE", "1"]
      taskSpec:
        params:
          - name: namespace
            type: string
          - name: image-backend
            type: string
          - name: image-frontend
            type: string
        steps:
          - name: patch-deployment
            image: quay.io/openshift/origin-cli:4.16
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              NS="$(params.namespace)"
              oc set image deployment/unified-dashboard-backend \
                backend="$(params.image-backend)" \
                -n "${NS}"
              oc set image deployment/unified-dashboard-frontend \
                frontend="$(params.image-frontend)" \
                -n "${NS}"
              oc rollout status deployment/unified-dashboard-backend -n "${NS}" --timeout=5m
              oc rollout status deployment/unified-dashboard-frontend -n "${NS}" --timeout=5m
      params:
        - name: namespace
          value: $(params.deploy-namespace)
        - name: image-backend
          value: $(params.image-registry)/unified-dashboard-backend:$(params.image-tag)
        - name: image-frontend
          value: $(params.image-registry)/unified-dashboard-frontend:$(params.image-tag)
