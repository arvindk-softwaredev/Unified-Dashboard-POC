apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-simple
  labels:
    app.kubernetes.io/part-of: unified-dashboard
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git:2.45.2
      script: |
        #!/usr/bin/env sh
        set -eu
        cd "$(workspaces.output.path)"
        git clone --depth 1 --branch "$(params.revision)" "$(params.url)" .
      computeResources:
        requests:
          memory: 128Mi
          cpu: 100m
